apiVersion: apps/v1
kind: Deployment
metadata:
  name: swap
  namespace: biodiversity
  labels:
    app: swap
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: swap
  template:
    metadata:
      labels:
        app: swap
    spec:
      initContainers:
      - name: git-clone
        image: alpine/git:2.52.0
        command:
        - sh
        - -c
        - |
          # Clone this app repo at pod startup; whatever is on `main` runs live.
          git clone --depth 1 https://github.com/boettiger-lab/swap.git /tmp/repo
          cp /tmp/repo/index.html /usr/share/nginx/html/
          cp /tmp/repo/docs.html /usr/share/nginx/html/
          cp /tmp/repo/layers-input.json /usr/share/nginx/html/
          cp /tmp/repo/system-prompt.md /usr/share/nginx/html/
        volumeMounts:
        - name: website-content
          mountPath: /usr/share/nginx/html
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        env:
        - name: TMPDIR
          value: "/tmp"
        - name: MCP_SERVER_URL
          value: "https://dev-duckdb-mcp.nrp-nautilus.io/mcp"
        - name: LLM_ENDPOINT
          value: "https://open-llm-proxy.nrp-nautilus.io/v1"
        - name: PROXY_KEY
          valueFrom:
            secretKeyRef:
              name: open-llm-proxy-secrets
              key: proxy-key
        command:
        - sh
        - -c
        - |
          apk add --no-cache gettext
          # Client-side config: no secrets, only ${MCP_SERVER_URL}
          envsubst '$${MCP_SERVER_URL}' < /config/config.template.json \
            > /usr/share/nginx/html/config.json
          # Server-side nginx config: substitutes ${PROXY_KEY} into the
          # Authorization header used by the /api/llm/ reverse proxy.
          # Limit envsubst to just ${PROXY_KEY} so nginx's own $uri /
          # $remote_addr style variables are left alone.
          envsubst '$${PROXY_KEY}' < /nginx-template/nginx.conf.template \
            > /etc/nginx/conf.d/default.conf
          # Pin worker count: nginx defaults to `worker_processes auto`
          # (one per CPU). On high-core NRP nodes that spawns 300+ workers
          # and OOMKills the 256Mi container (geo-agent-ops#49). Patch the
          # main config in place — the `-g 'worker_processes 2;'` global
          # override is rejected as a duplicate directive.
          sed -i 's/^worker_processes.*/worker_processes 2;/' /etc/nginx/nginx.conf
          nginx -g 'daemon off;'
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        volumeMounts:
        - name: website-content
          mountPath: /usr/share/nginx/html
        - name: nginx-template
          mountPath: /nginx-template
          readOnly: true
        - name: nginx-conf-d
          mountPath: /etc/nginx/conf.d
        - name: config-template
          mountPath: /config
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: website-content
        emptyDir: {}
      - name: config-template
        configMap:
          name: swap-config
      - name: nginx-template
        configMap:
          name: swap-nginx
      - name: nginx-conf-d
        emptyDir: {}
